<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* кнопка */
.center {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

button {
  padding: 20px 60px;
  font-size: 22px;
  border-radius: 15px;
  border: none;
  background: hotpink;
  color: white;
  cursor: pointer;
}

/* фотки */
.gallery {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  gap: 100px;
}

.card { width: 260px; }

.card img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 25px pink;
}

.left { margin-left: 10%; }
.right { margin-left: auto; margin-right: 10%; }

/* 🎵 плеер */
.player {
  width: 320px;
  margin: 120px auto;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  text-align: center;
}

.playlist {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 15px;
  text-shadow: 0 0 15px white;
}

.track {
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
}

.track.active {
  background: hotpink;
}

/* 🎛 панель управления */
.controls {
  position: fixed;
  bottom: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  padding: 15px;
  border-radius: 20px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);

  display: flex;
  justify-content: space-around;
  align-items: center;

  transition: 0.5s;
}

.controls.show {
  bottom: 20px;
}

.controls button {
  padding: 10px 15px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
}

/* 🌸 сакура */
.sakura {
  position: fixed;
  top: -20px;
  pointer-events: none;
  z-index: 9999;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<div class="gallery">
  <div class="card left"><img src="IMG_20260523_201659_341.jpg"></div>
  <div class="card right"><img src="IMG_20260523_201702_994.jpg"></div>
  <div class="card left"><img src="IMG_20260523_201704_693.jpg"></div>
</div>

<div class="player">
  <div class="playlist">playlist</div>

  <div class="track" onclick="playTrack(0)">mayle</div>
  <div class="track" onclick="playTrack(1)">ты похож на кота</div>
  <div class="track" onclick="playTrack(2)">ты не такая</div>
  <div class="track" onclick="playTrack(3)">у девчонок</div>
</div>

<!-- 🎛 управление -->
<div class="controls" id="controls">
  <button onclick="prev()">⏮</button>
  <button onclick="toggle()">⏯</button>
  <button onclick="next()">⏭</button>
</div>

<audio id="audio"></audio>

<script>
const tracks = [
  "music.mp3",
  "music1.mp3",
  "music2.mp3",
  "music3.mp3"
];

let current = 0;
const audio = document.getElementById("audio");
const controls = document.getElementById("controls");
const trackEls = document.querySelectorAll(".track");

function playTrack(index) {
  current = index;
  audio.src = tracks[index];
  audio.play();

  controls.classList.add("show");

  trackEls.forEach(el => el.classList.remove("active"));
  trackEls[index].classList.add("active");
}

function toggle() {
  if (audio.paused) audio.play();
  else audio.pause();
}

function next() {
  current = (current + 1) % tracks.length;
  playTrack(current);
}

function prev() {
  current = (current - 1 + tracks.length) % tracks.length;
  playTrack(current);
}

/* 🌸 сакура */
function sakura() {
  const el = document.createElement("div");
  el.className = "sakura";
  el.innerHTML = "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 25 + 15) + "px";
  el.style.animationDuration = (Math.random() * 5 + 5) + "s";

  document.body.appendChild(el);
  setTimeout(() => el.remove(), 10000);
}

setInterval(sakura, 100);
</script>

</body>
</html>
