<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* верх */
h1 {
  text-align: center;
  margin-top: 20px;
}

.center {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

button {
  padding: 18px 50px;
  font-size: 20px;
  border-radius: 12px;
  border: none;
  background: white;
  cursor: pointer;
}

button:hover {
  background: pink;
  transform: scale(1.1);
}

/* контейнер */
.gallery {
  position: relative;
  height: 900px;
  margin-top: 60px;
}

/* тексты */
.item {
  position: absolute;
  font-size: 20px;
  font-weight: bold;
}

/* позиции текста */
.t1 { left: 20%; top: 80px; }
.t2 { left: 55%; top: 350px; }
.t3 { left: 25%; top: 620px; }

/* SVG линии */
svg {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

path {
  stroke: white;
  stroke-width: 2.5;
  fill: none;
  stroke-linecap: round;
  filter: drop-shadow(0 0 6px white);

  stroke-dasharray: 1200;
  stroke-dashoffset: 1200;

  animation: draw 2.5s ease forwards;
}

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

/* комплимент */
.bottom {
  text-align: center;
  margin-top: 120px;
  margin-bottom: 40px;

  color: white;
  font-weight: bold;
  text-shadow:
    0 0 8px white,
    0 0 20px white;
}

/* сакура */
.sakura {
  position: fixed;
  top: -10px;
  color: pink;
  pointer-events: none;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>твой любимый Амир</h1>

<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<div class="gallery">

  <!-- ТЕКСТЫ -->
  <div class="item t1" id="t1">няшка</div>
  <div class="item t2" id="t2">снежная красавица</div>
  <div class="item t3" id="t3">агентка</div>

  <!-- ЛИНИИ -->
  <svg id="svg"></svg>

</div>

<div class="bottom">
  Соня — это человек, который делает этот мир теплее и красивее ✨
</div>

<script>
function line(a, b, svg) {
  const r1 = a.getBoundingClientRect();
  const r2 = b.getBoundingClientRect();

  const x1 = r1.left + r1.width / 2;
  const y1 = r1.bottom;

  const x2 = r2.left + r2.width / 2;
  const y2 = r2.top;

  const p = document.createElementNS("http://www.w3.org/2000/svg", "path");

  const d = `M ${x1} ${y1} C ${x1} ${y1 + 100}, ${x2} ${y2 - 100}, ${x2} ${y2}`;

  p.setAttribute("d", d);

  svg.appendChild(p);
}

function draw() {
  const svg = document.getElementById("svg");
  svg.innerHTML = "";

  line(document.getElementById("t1"), document.getElementById("t2"), svg);
  line(document.getElementById("t2"), document.getElementById("t3"), svg);
}

window.onload = draw;
window.onresize = draw;
</script>

</body>
</html>
