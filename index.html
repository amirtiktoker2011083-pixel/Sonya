<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* 🔝 верх */
h1 {
  text-align: center;
  margin-top: 20px;
}

.center {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

button {
  padding: 18px 50px;
  font-size: 20px;
  border-radius: 12px;
  border: none;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: pink;
  transform: scale(1.1);
}

/* 📦 галерея */
.gallery {
  position: relative;
  height: 1000px;
  margin-top: 60px;
}

/* карточки */
.item {
  position: absolute;
  width: 230px;
  text-align: center;
  font-weight: bold;
}

.item img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 20px pink;
}

/* 📍 позиции */
.t1 { left: 15%; top: 60px; }
.t2 { left: 55%; top: 360px; }
.t3 { left: 20%; top: 680px; }

/* 🔗 линии */
svg {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

path {
  stroke: white;
  stroke-width: 3;
  fill: none;
  stroke-linecap: round;

  filter: drop-shadow(0 0 6px white);

  stroke-dasharray: 1500;
  stroke-dashoffset: 1500;

  animation: draw 2.5s ease forwards;
}

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

/* 💬 нижний текст */
.bottom {
  text-align: center;
  margin-top: 120px;
  margin-bottom: 60px;

  font-size: 20px;
  font-weight: bold;
  color: white;

  text-shadow:
    0 0 10px white,
    0 0 20px white;
}

/* 🌸 сакура */
.sakura {
  position: fixed;
  top: -10px;
  color: pink;
  pointer-events: none;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>твой любимый Амир</h1>

<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<div class="gallery">

  <!-- 1 -->
  <div class="item t1" id="t1">
    няшка
    <img src="IMG_20260523_201659_341.jpg">
  </div>

  <!-- 2 -->
  <div class="item t2" id="t2">
    снежная красавица
    <img src="IMG_20260523_201702_994.jpg">
  </div>

  <!-- 3 -->
  <div class="item t3" id="t3">
    агентка
    <img src="IMG_20260523_201704_693.jpg">
  </div>

  <!-- линии -->
  <svg id="svg"></svg>

</div>

<!-- 💖 текст внизу -->
<div class="bottom">
  Соня — это человек, который делает этот мир теплее, красивее и спокойнее ✨
</div>

<script>
function line(a, b, svg) {
  const r1 = a.getBoundingClientRect();
  const r2 = b.getBoundingClientRect();

  const x1 = r1.left + r1.width / 2;
  const y1 = r1.bottom;

  const x2 = r2.left + r2.width / 2;
  const y2 = r2.top;

  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

  const d = `M ${x1} ${y1} C ${x1} ${y1 + 120}, ${x2} ${y2 - 120}, ${x2} ${y2}`;

  path.setAttribute("d", d);

  svg.appendChild(path);
}
