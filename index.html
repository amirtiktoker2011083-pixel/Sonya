<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* ВЕРХ */
h1 {
  text-align: center;
  margin-top: 20px;
}

.center {
  display: flex;
  justify-content: center;
  margin-top: 15px;
}

button {
  padding: 18px 50px;
  font-size: 20px;
  border-radius: 12px;
  border: none;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: pink;
  transform: scale(1.1);
}

/* ГАЛЕРЕЯ */
.gallery {
  position: relative;
  width: 100%;
  height: 900px;
  margin-top: 60px;
}

/* ТЕКСТЫ + ФОТО */
.item {
  position: absolute;
  width: 220px;
  text-align: center;
}

.item img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 15px pink;
}

/* позиции (ровные) */
.i1 { left: 10%; top: 0; }
.i2 { left: 60%; top: 280px; }
.i3 { left: 15%; top: 560px; }

/* SVG ЛИНИЯ */
svg {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* красивая линия */
path {
  stroke: white;
  stroke-width: 2.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;

  filter: drop-shadow(0 0 6px white);

  stroke-dasharray: 1200;
  stroke-dashoffset: 1200;

  animation: draw 3s ease forwards;
}

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

/* 💬 КОМПЛИМЕНТ */
.bottom {
  text-align: center;
  margin-top: 120px;
  margin-bottom: 50px;

  color: white;
  font-size: 20px;
  font-weight: bold;

  text-shadow:
    0 0 8px white,
    0 0 15px white,
    0 0 25px white;
}

/* 🌸 САКУРА */
.sakura {
  position: fixed;
  top: -10px;
  color: pink;
  pointer-events: none;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>твой любимый Амир</h1>

<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<div class="gallery">

  <!-- 1 -->
  <div class="item i1">
    <p>няшка</p>
    <img src="IMG_20260523_201659_341.jpg">
  </div>

  <!-- 2 -->
  <div class="item i2">
    <p>снежная красавица</p>
    <img src="IMG_20260523_201702_994.jpg">
  </div>

  <!-- 3 -->
  <div class="item i3">
    <p>агентка</p>
    <img src="IMG_20260523_201704_693.jpg">
  </div>

  <!-- 🔥 КРАСИВАЯ ТРАЕКТОРИЯ -->
  <svg viewBox="0 0 1000 900">
    <path d="
      M 180 120
      Q 400 0, 600 320
      Q 450 450, 200 620
    "/>
  </svg>

</div>

<!-- 💬 НИЗ -->
<div class="bottom">
  Соня — это человек, который делает этот мир теплее, спокойнее и красивее ✨
</div>

<script>
function sakura() {
  const el = document.createElement("div");
  el.classList.add("sakura");
  el.innerHTML = "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 15 + 10) + "px";
  el.style.animationDuration = (Math.random() * 4 + 3) + "s";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 7000);
}

setInterval(sakura, 200);
</script>

</body>
</html>
