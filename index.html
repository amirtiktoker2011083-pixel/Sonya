<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* кнопка */
.center {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

button {
  padding: 20px 60px;
  font-size: 22px;
  border-radius: 15px;
  border: none;
  background: hotpink;
  color: white;
  cursor: pointer;
}

/* фотки */
.gallery {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  gap: 100px;
}

.card { width: 260px; }

.card img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 25px pink;
}

.left { margin-left: 10%; }
.right { margin-left: auto; margin-right: 10%; }

/* 🎵 плеер */
.player {
  width: 320px;
  margin: 120px auto;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  text-align: center;
}

.playlist {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 15px;
  text-shadow: 0 0 15px white;
}

.track {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  transition: 0.3s;
}

.track.active {
  background: hotpink;
}

/* 🎛 управление ПОД ТРЕКОМ */
.controls {
  margin-top: 10px;
  display: none;
  justify-content: center;
  gap: 10px;

  animation: drop 0.3s ease;
}

.controls.show {
  display: flex;
}

.controls button {
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}

.controls button:hover {
  background: hotpink;
}

/* анимация */
@keyframes drop {
  from {
    transform: translateY(-10px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* 🌸 сакура */
.sakura {
  position: fixed;
  top: -20px;
  pointer-events: none;
  z-index: 9999;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<div class="gallery">
  <div class="card left"><img src="IMG_20260523_201659_341.jpg"></div>
  <div class="card right"><img src="IMG_20260523_201702_994.jpg"></div>
  <div class="card left"><img src="IMG_20260523_201704_693.jpg"></div>
</div>

<div class="player">
  <div class="playlist">playlist</div>

  <div class="track" onclick="playTrack(0)">
    mayle
    <div class="controls">
      <button onclick="prev(event)">назад</button>
      <button onclick="toggle(event)">пауза</button>
      <button onclick="next(event)">вперёд</button>
    </div>
  </div>

  <div class="track" onclick="playTrack(1)">
    ты похож на кота
    <div class="controls">
      <button onclick="prev(event)">назад</button>
      <button onclick="toggle(event)">пауза</button>
      <button onclick="next(event)">вперёд</button>
    </div>
  </div>

  <div class="track" onclick="playTrack(2)">
    ты не такая
    <div class="controls">
      <button onclick="prev(event)">назад</button>
      <button onclick="toggle(event)">пауза</button>
      <button onclick="next(event)">вперёд</button>
    </div>
  </div>

  <div class="track" onclick="playTrack(3)">
    у девчонок
    <div class="controls">
      <button onclick="prev(event)">назад</button>
      <button onclick="toggle(event)">пауза</button>
      <button onclick="next(event)">вперёд</button>
    </div>
  </div>

</div>

<audio id="audio"></audio>

<script>
const tracks = [
  "music.mp3",
  "music1.mp3",
  "music2.mp3",
  "music3.mp3"
];

let current = 0;
const audio = document.getElementById("audio");
const trackEls = document.querySelectorAll(".track");

function playTrack(index) {
  current = index;

  audio.src = tracks[index];
  audio.play();

  trackEls.forEach(t => {
    t.classList.remove("active");
    t.querySelector(".controls").classList.remove("show");
  });

  const active = trackEls[index];
  active.classList.add("active");
  active.querySelector(".controls").classList.add("show");
}

function toggle(e) {
  e.stopPropagation();
  if (audio.paused) audio.play();
  else audio.pause();
}

function next(e) {
  e.stopPropagation();
  current = (current + 1) % tracks.length;
  playTrack(current);
}

function prev(e) {
  e.stopPropagation();
  current = (current - 1 + tracks.length) % tracks.length;
  playTrack(current);
}

/* 🌸 сакура */
function sakura() {
  const el = document.createElement("div");
  el.className = "sakura";
  el.innerHTML = "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 25 + 15) + "px";
  el.style.animationDuration = (Math.random() * 5 + 5) + "s";

  document.body.appendChild(el);
  setTimeout(() => el.remove(), 10000);
}

setInterval(sakura, 100);
</script>

</body>
</html>
