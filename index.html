<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* верх */
.center {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

button {
  padding: 20px 60px;
  font-size: 22px;
  border-radius: 15px;
  border: none;
  background: hotpink;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px hotpink;
}

/* галерея */
.gallery {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  gap: 100px;
}

/* карточки */
.card {
  width: 260px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 25px pink;
}

/* позиции */
.left {
  margin-left: 10%;
}

.right {
  margin-left: auto;
  margin-right: 10%;
}

/* 🎵 ПЛЕЕР */
.player {
  text-align: center;
  margin-top: 120px;
  margin-bottom: 60px;
}

/* линия */
.line {
  width: 200px;
  height: 3px;
  background: white;
  margin: 20px auto;

  box-shadow:
    0 0 10px white,
    0 0 20px white,
    0 0 30px white;
}

/* текст */
.playlist {
  font-size: 24px;
  font-weight: bold;

  text-shadow:
    0 0 10px white,
    0 0 20px white;
}

/* 🌸 сакура */
.sakura {
  position: fixed;
  top: -20px;
  pointer-events: none;
  z-index: 9999;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- кнопка -->
<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<!-- фотки -->
<div class="gallery">

  <div class="card left">
    <p>няшка</p>
    <img src="IMG_20260523_201659_341.jpg">
  </div>

  <div class="card right">
    <p>снежная красавица</p>
    <img src="IMG_20260523_201702_994.jpg">
  </div>

  <div class="card left">
    <p>агентка</p>
    <img src="IMG_20260523_201704_693.jpg">
  </div>

</div>

<!-- 🎵 плеер -->
<div class="player">

  <!-- сам трек -->
  <audio controls>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- линия -->
  <div class="line"></div>

  <!-- текст -->
  <div class="playlist">playlist</div>

</div>

<script>
function sakura() {
  const el = document.createElement("div");
  el.className = "sakura";
  el.innerHTML = "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 25 + 15) + "px";
  el.style.animationDuration = (Math.random() * 5 + 5) + "s";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 10000);
}

setInterval(sakura, 100);
</script>

</body>
</html>
