<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* заголовок */
h1 {
  text-align: center;
  margin-top: 30px;
}

/* кнопка */
.center {
  display: flex;
  justify-content: center;
  margin-top: 60px;
}

button {
  padding: 25px 60px;
  font-size: 25px;
  border-radius: 15px;
  border: none;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  background: pink;
}

/* ГАЛЕРЕЯ */
.gallery {
  margin-top: 100px;
}

/* строка (фото + линия) */
.row {
  display: flex;
  align-items: center;
  width: 100%;
  margin: 80px 0;
}

/* лево / право */
.left {
  justify-content: flex-start;
  padding-left: 10%;
}

.right {
  justify-content: flex-end;
  padding-right: 10%;
}

/* карточка */
.card {
  width: 250px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 20px pink;
}

/* ЛИНИЯ */
.line {
  width: 150px;
  height: 2px;
  background: white;
  box-shadow: 0 0 10px white;
  margin: 0 20px;

  transform: scaleX(0);
  transform-origin: left;
  animation: draw 1.2s forwards;
}

@keyframes draw {
  to {
    transform: scaleX(1);
  }
}

/* САКУРА */
.sakura {
  position: fixed;
  top: -10px;
  font-size: 18px;
  color: pink;
  pointer-events: none;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>твой любимый Амир</h1>

<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<div class="gallery">

  <div class="row left">
    <div class="card">
      <p>няшка</p>
      <img src="IMG_20260523_201659_341.jpg">
    </div>
    <div class="line"></div>
  </div>

  <div class="row right">
    <div class="line"></div>
    <div class="card">
      <p>снежная красавица</p>
      <img src="IMG_20260523_201702_994.jpg">
    </div>
  </div>

  <div class="row left">
    <div class="card">
      <p>агентка</p>
      <img src="IMG_20260523_201704_693.jpg">
    </div>
    <div class="line"></div>
  </div>

</div>

<script>
/* 💗 сакура */
function sakura() {
  const el = document.createElement("div");
  el.classList.add("sakura");
  el.innerHTML = "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.animationDuration = (Math.random() * 3 + 3) + "s";
  el.style.fontSize = (Math.random() * 15 + 10) + "px";

  document.body.appendChild(el);

  setTimeout(() => {
    el.remove();
  }, 6000);
}

setInterval(sakura, 200);
</script>

</body>
</html>
