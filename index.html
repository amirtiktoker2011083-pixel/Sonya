<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* кнопка */
.center {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

button {
  padding: 20px 60px;
  font-size: 22px;
  border-radius: 15px;
  border: none;
  background: hotpink;
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px hotpink;
}

/* фотки */
.gallery {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  gap: 100px;
}

.card {
  width: 260px;
}

.card img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 25px pink;
}

.left {
  margin-left: 10%;
}

.right {
  margin-left: auto;
  margin-right: 10%;
}

/* 🎵 плеер */
.player {
  width: 320px;
  margin: 120px auto 60px;
  padding: 20px;
  border-radius: 20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);

  box-shadow: 0 0 20px rgba(255,255,255,0.2);
  text-align: center;
}

.playlist {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 15px;

  text-shadow:
    0 0 10px white,
    0 0 20px white;
}

.track {
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;

  background: rgba(255,255,255,0.1);
  transition: 0.3s;
}

.track:hover {
  background: rgba(255,255,255,0.2);
}

/* 🌸 сакура */
.sakura {
  position: fixed;
  top: -20px;
  pointer-events: none;
  z-index: 9999;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- кнопка -->
<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<!-- фотки -->
<div class="gallery">

  <div class="card left">
    <img src="IMG_20260523_201659_341.jpg">
  </div>

  <div class="card right">
    <img src="IMG_20260523_201702_994.jpg">
  </div>

  <div class="card left">
    <img src="IMG_20260523_201704_693.jpg">
  </div>

</div>

<!-- 🎵 плеер -->
<div class="player">

  <div class="playlist">playlist</div>

  <div class="track" onclick="playMusic('music.mp3')">
    mayle
  </div>

  <div class="track" onclick="playMusic('music1.mp3')">
    ты похож на кота
  </div>

  <div class="track" onclick="playMusic('music2.mp3')">
    ты не такая
  </div>

  <div class="track" onclick="playMusic('music3.mp3')">
    у девчонок
  </div>

  <audio id="audio"></audio>

</div>

<script>
function playMusic(src) {
  const audio = document.getElementById("audio");

  if (audio.src.includes(src) && !audio.paused) {
    audio.pause();
  } else {
    audio.src = src;
    audio.play();
  }
}

/* 🌸 сакура */
function sakura() {
  const el = document.createElement("div");
  el.className = "sakura";
  el.innerHTML = "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 25 + 15) + "px";
  el.style.animationDuration = (Math.random() * 5 + 5) + "s";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 10000);
}

setInterval(sakura, 100);
</script>

</body>
</html>
