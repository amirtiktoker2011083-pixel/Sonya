<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* галерея */
.gallery {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 80px;
  margin-top: 80px;
}

/* карточки */
.card {
  width: 260px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 25px pink;
}

.card p {
  margin-bottom: 10px;
  font-size: 20px;
}

/* 🌸 сакура */
.sakura {
  position: fixed;
  top: -20px;
  pointer-events: none;
  z-index: 9999;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="gallery">

  <div class="card">
    <p>няшка</p>
    <img src="IMG_20260523_201659_341.jpg">
  </div>

  <div class="card">
    <p>снежная красавица</p>
    <img src="IMG_20260523_201702_994.jpg">
  </div>

  <div class="card">
    <p>агентка</p>
    <img src="IMG_20260523_201704_693.jpg">
  </div>

</div>

<script>
function sakura() {
  const el = document.createElement("div");
  el.className = "sakura";
  el.innerHTML = "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 25 + 15) + "px";
  el.style.animationDuration = (Math.random() * 5 + 5) + "s";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 10000);
}

setInterval(sakura, 100);
</script>

</body>
</html>
