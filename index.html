<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* 🔝 ТЕКСТ СВЕРХУ */
h1 {
  text-align: center;
  margin-top: 25px;
  font-size: 28px;
}

/* 💗 КНОПКА ПО ЦЕНТРУ */
.center {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

button {
  padding: 20px 55px;
  font-size: 22px;
  border-radius: 15px;
  border: none;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: pink;
  transform: scale(1.1);
}

/* ГАЛЕРЕЯ */
.gallery {
  position: relative;
  margin-top: 100px;
  height: 900px;
}

/* ФОТО */
.card {
  width: 220px;
  text-align: center;
  position: absolute;
}

.card img {
  width: 100%;
  border-radius: 15px;
  border: 3px solid white;
  box-shadow: 0 0 20px pink;
}

.card p {
  margin-bottom: 8px;
}

/* позиции */
.p1 { left: 10%; top: 0; }
.p2 { right: 10%; top: 300px; }
.p3 { left: 10%; top: 600px; }

/* 🔥 ЛИНИЯ */
svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

path {
  stroke: white;
  stroke-width: 2;
  fill: none;
  filter: drop-shadow(0 0 6px white);

  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;

  animation: draw 3s ease forwards;
}

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

/* 💖 КОМПЛИМЕНТ ВНИЗУ */
.bottom-text {
  text-align: center;
  margin-top: 120px;
  margin-bottom: 60px;
  font-size: 22px;
  font-weight: bold;

  color: pink;
  text-shadow:
    0 0 10px pink,
    0 0 20px pink,
    0 0 30px hotpink;
}

/* 🌸 САКУРА */
.sakura {
  position: fixed;
  top: -10px;
  color: pink;
  pointer-events: none;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- 🔝 ВЕРХ -->
<h1>твой любимый Амир</h1>

<div class="center">
  <button onclick="window.location.href='https://t.me/Conechka22056'">
    люблю соню
  </button>
</div>

<!-- ФОТО -->
<div class="gallery">

  <div class="card p1">
    <p>няшка</p>
    <img src="IMG_20260523_201659_341.jpg">
  </div>

  <div class="card p2">
    <p>снежная красавица</p>
    <img src="IMG_20260523_201702_994.jpg">
  </div>

  <div class="card p3">
    <p>агентка</p>
    <img src="IMG_20260523_201704_693.jpg">
  </div>

  <!-- линия -->
  <svg viewBox="0 0 1000 900">
    <path d="M 250 80
             C 500 150, 500 200, 750 380
             C 500 450, 500 500, 250 680" />
  </svg>

</div>

<!-- 💖 НИЗ -->
<div class="bottom-text">
  Соня — это человек, который делает этот мир мягче, теплее и красивее ✨
</div>

<script>
function sakura() {
  const el = document.createElement("div");
  el.classList.add("sakura");
  el.innerHTML = "🌸";

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 15 + 10) + "px";
  el.style.animationDuration = (Math.random() * 4 + 3) + "s";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 7000);
}

setInterval(sakura, 200);
</script>

</body>
</html>
